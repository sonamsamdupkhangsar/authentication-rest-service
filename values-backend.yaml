# Default values for mychart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/sonamsamdupkhangsar/authentication-rest-service
  tag: multitenancy
  pullPolicy: Always

imagePullSecrets:
  - name: github-regcred
nameOverride: ""
fullnameOverride: "authentication-rest-service"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name:

rbac:
  create: true
  rules:
    - apiGroups:
        - ""
      resources:
        - services
        - endpoints
      verbs:
        - get
        - list
        - watch

podSecurityContext: {}
# fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
# runAsUser: 1000

service:
  type: ClusterIP
#  type: NodePort
  port: 80
  targetPort: 8080

istio:
  enabled: false

ingress:
  enabled: false
  ingressClass: nginx
  hosts:
    - host: authentication-rest-service.sonam.cloud
      paths:
        - path: /public
          pathType: Prefix
  tls:
    - secretName: sonam.cloud
      hosts:
        - "*.sonam.cloud"

httproute:
  gatewayName: ""
  namespace: "main"
  hostnames:
    - "platform.openissuer.com"
  httpsListenerName: "https-platform"
  httpListenerName: "http-platform"
  pathPrefix: "/authentications"

resources:
  requests:
    cpu: 150m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 768Mi

#nodeSelector:
#  node.kubernetes.io/instance-type: s-1vcpu-2gb

tolerations: []

affinity: {}


postgres:
  port: "5432"
  service: authentication-db-rw
  secretfile: authentication-db-app
  dbname: authentication

envs:
  - name: JAVA_TOOL_OPTIONS
    value: "-XX:MaxRAMPercentage=70 -XX:InitialRAMPercentage=25"
  - name: DB_SSLMODE
    value: disable
  - name: OAUTH_AUDIENCES
    value: oauth-client
  - name: JWT_SET_URI
    value: https://platform.openissuer.com/issuer/oauth2/jwks
  - name: SPRING_PROFILES_ACTIVE
    value: kubernetes
  - name: SPRING_CLOUD_KUBERNETES_DISCOVERY_NAMESPACES_0
    value: "{{ .Release.Namespace }}"
  - name: APPLICATION_REST_SERVICE
    value: "http://application-rest-service.{{ .Release.Namespace }}.svc.cluster.local"
  - name:  ACCOUNT_REST_SERVICE
    value: "http://account-rest-service.{{ .Release.Namespace }}.svc.cluster.local"
  - name: ROLE_REST_SERVICE
    value: "http://role-rest-service.{{ .Release.Namespace }}.svc.cluster.local"
  - name: ROLE_REST_SERVICE_ROOT
    value: "http://role-rest-service.{{ .Release.Namespace }}.svc.cluster.local"
  - name: AUTH_SERVER_ROOT
    value: "http://authorization-server.{{ .Release.Namespace }}.svc.cluster.local"
  - name: ISSUER_URI
    value: https://platform.openissuer.com/issuer
  - name: NEW_RELIC_ENABLED
    value: "false"

health:
  liveness:
    path: /authentications/api/health/liveness
    port: 8080
    initialDelaySeconds: 60
    periodSeconds: 5
    failureThreshold: 5
  readiness:
    path: /authentications/api/health/readiness
    port: 8080
    initialDelaySeconds: 60
    periodSeconds: 5
    failureThreshold: 5

secretFiles: []
